<!DOCTYPE html>
<html>
<head>
  <title>GAN Links</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
      margin: 0;
    }

    /* 🔥 LOGO WRAPPER (FIXES STRETCHING COMPLETELY) */
    .logo-wrapper {
      width: 110px;
      height: 110px;
      margin: 0 auto 15px auto;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #334155;
    }

    .logo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    h1 {
      margin-bottom: 25px;
      font-size: 24px;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      margin: 14px auto;
      padding: 15px;

      width: 90%;
      max-width: 280px;

      background: #1e293b;
      color: white;
      text-decoration: none;
      border-radius: 12px;

      transition: 0.2s ease-in-out;
      font-size: 16px;
    }

    .link i {
      font-size: 18px;
    }

    .link:hover {
      background: #334155;
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(255,255,255,0.08);
    }

    @media (max-width: 480px) {
      body {
        padding: 25px;
      }
    }
  </style>
</head>

<body>

  <!-- 🔥 LOGO -->
  <div class="logo-wrapper">
    <img src="gan.jpeg" alt="GAN Logo">
  </div>

  <h1>GAN Links</h1>

  <a class="link" href="https://instagram.com/gan_nigeeria">
    <i class="fab fa-instagram"></i> Follow on Instagram
  </a>

  <a class="link" href="https://twitter.com/gan_nigeria">
    <i class="fa-brands fa-x-twitter"></i> Find us on X
  </a>

  <a class="link" href="https://facebook.com/gannigeria">
    <i class="fab fa-facebook"></i> Find us on Facebook
  </a>

  <a class="link" href="https://chat.whatsapp.com/GIc9jZNjH7F4HugushwIJa">
    <i class="fab fa-whatsapp"></i> Join the WhatsApp Community
  </a>

</body>
</html>
